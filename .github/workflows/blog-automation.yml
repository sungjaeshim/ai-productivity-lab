name: Blog Automation

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'
  pull_request:
    branches: [main]
  schedule:
    # 매주 일요일 01:00 UTC (KST 10:00)
    - cron: '0 1 * * 0'

jobs:
  content-safety:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve blog diff refs
        id: refs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE_REF="origin/${{ github.base_ref }}"
            HEAD_REF="HEAD"
            CHANGED=$(git diff --name-only "${BASE_REF}...${HEAD_REF}" -- 'src/content/blog/*.md' 'src/content/blog/*.mdx' || true)
          else
            BASE_REF="${{ github.event.before }}"
            if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
              BASE_REF="$(git rev-list --max-parents=0 HEAD)"
            fi
            HEAD_REF="${{ github.sha }}"
            CHANGED=$(git diff --name-only "$BASE_REF" "$HEAD_REF" -- 'src/content/blog/*.md' 'src/content/blog/*.mdx' || true)
          fi

          echo "base=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD_REF" >> "$GITHUB_OUTPUT"
          {
            echo 'files<<EOF'
            echo "$CHANGED"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Validate changed blog frontmatter
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t FILES < <(echo "${{ steps.refs.outputs.files }}" | sed '/^$/d')
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No changed blog markdown files. Skipping changed-file checks."
            exit 0
          fi
          node scripts/validate-blog-frontmatter.mjs "${FILES[@]}"

      - name: Check exact duplicate heroImage values
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t FILES < <(echo "${{ steps.refs.outputs.files }}" | sed '/^$/d')
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No changed blog markdown files. Skipping duplicate heroImage check."
            exit 0
          fi
          node scripts/check-duplicate-hero-images.mjs "${FILES[@]}"

      - name: Block blog history regression
        run: |
          node scripts/check-blog-regression.mjs \
            --base "${{ steps.refs.outputs.base }}" \
            --head "${{ steps.refs.outputs.head }}"

  # 새 포스팅 감지 & 알림
  new-post-notify:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check for new posts
        id: check
        run: |
          NEW_POSTS=$(git diff --name-only HEAD~1 HEAD -- 'src/content/blog/*.md' | wc -l)
          echo "count=$NEW_POSTS" >> $GITHUB_OUTPUT
          
          if [ "$NEW_POSTS" -gt 0 ]; then
            TITLES=$(git diff --name-only HEAD~1 HEAD -- 'src/content/blog/*.md' | xargs basename -a .md | tr '\n' ', ')
            echo "titles=$TITLES" >> $GITHUB_OUTPUT
          fi
      
      - name: Notify (optional webhook)
        if: steps.check.outputs.count > 0
        run: |
          echo "🆕 New posts: ${{ steps.check.outputs.titles }}"
          # TODO: Telegram webhook integration

  # 끊어진 링크 체크
  link-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      
      - name: Check internal links
        run: |
          echo "🔗 Checking internal links..."
          # 내부 링크 추출 및 검증
          grep -roh '\](/[^)]*\)' src/content/blog/*.md | sort -u | while read link; do
            path=$(echo "$link" | sed 's/\](\(.*\))/\1/' | sed 's/#.*//')
            if [[ "$path" == /* ]] && [[ ! -f "src/pages$path.astro" ]] && [[ ! -f "src/content/blog${path}.md" ]]; then
              echo "⚠️ Broken link: $link"
            fi
          done

  # PR 자동 라벨링
  auto-label:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            
            const changes = files.reduce((acc, f) => acc + f.changes, 0);
            let sizeLabel = 'size/S';
            if (changes > 500) sizeLabel = 'size/L';
            else if (changes > 100) sizeLabel = 'size/M';
            
            // 콘텐츠 타입 라벨
            const hasBlog = files.some(f => f.filename.includes('blog/'));
            const hasConfig = files.some(f => f.filename.includes('astro.config') || f.filename === 'package.json');
            
            const labels = [sizeLabel];
            if (hasBlog) labels.push('content');
            if (hasConfig) labels.push('config');
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: labels
            });

  # 주간 통계 생성
  weekly-stats:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate weekly stats
        run: |
          echo "📊 Weekly Blog Stats"
          echo "===================="
          echo ""
          echo "📝 Total posts: $(ls -1 src/content/blog/*.md | wc -l)"
          echo "📅 Posts this week: $(git log --since='7 days ago' --name-only --pretty=format: -- 'src/content/blog/*.md' | sort -u | wc -l)"
          echo "✍️ Commits this week: $(git log --since='7 days ago' --oneline | wc -l)"
          echo ""
          echo "📚 Recent posts:"
          ls -lt src/content/blog/*.md | head -5 | awk '{print "  • " $NF}' | xargs -I{} basename {} .md
