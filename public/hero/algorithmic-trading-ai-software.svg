<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Algorithmic Trading AI Software</title>
  <desc id="desc">Editorial hero image for AI trading software guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f0e4"/>
      <stop offset="100%" stop-color="#dce8ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102544"/>
      <stop offset="100%" stop-color="#195fc9"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1360" cy="120" r="190" fill="#ff8b72" opacity="0.18"/>
  <circle cx="180" cy="760" r="220" fill="#0f7bff" opacity="0.12"/>
  <rect x="82" y="84" width="1436" height="732" rx="42" fill="#fffaf1" stroke="#1c2f4f" stroke-opacity="0.12"/>
  <rect x="128" y="132" width="760" height="636" rx="34" fill="url(#card)"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
