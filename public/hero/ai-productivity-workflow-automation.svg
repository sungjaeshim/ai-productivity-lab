<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Productivity Workflow Automation</title>
  <desc id="desc">Editorial hero image for workflow automation guide.</desc>
  <defs>
