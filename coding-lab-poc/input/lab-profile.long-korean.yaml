project_name: AI 실전 실행 스튜디오
slug: ai-execution-studio

subtitle: 긴 한국어 문장과 복합 설명을 담아도 카드 안에서 안정적으로 읽히는지 검증

audience: 제품 책임자 및 엔지니어링 이해관계자

purpose: >
  AI 에이전트와 자동화 워크플로를 사용해 아이디어 정의부터 프로토타입 구현,
  문서 패키징, 시각 자산 생성, 검토 공유까지 한 번에 이어지는 실행 체계를 만든다.
  긴 한국어 설명이 들어와도 텍스트가 패널 바깥으로 튀지 않고 안정적으로 줄바꿈되어야 한다.

keywords:
